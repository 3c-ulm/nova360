<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standort wählen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      width: 220px;
      height: auto;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 72px;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      background: transparent;
      border: 2px solid #1d9e75;
      padding: 18px 24px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s ease, transform 0.1s ease;
      active-scale: 0.97;
    }
    .btn:active {
      background: #1d9e75;
      transform: scale(0.97);
    }
    .btn:active .btn-brand,
    .btn:active .btn-brands span {
      color: #ffffff;
    }
    .btn:active .btn-brands .divider {
      color: rgba(255,255,255,0.4);
    }
    .btn-brand {
      font-size: 24px;
      font-weight: 700;
      color: #1d9e75;
      letter-spacing: 0.5px;
    }
    .btn-brands {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .btn-brands span {
      font-size: 18px;
      font-weight: 700;
      color: #1d9e75;
    }
    .btn-brands .divider {
      font-size: 16px;
      color: #1d9e75;
      opacity: 0.4;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <img class="logo" src="Basis_PNG.png" alt="3C Detailing" />
    <div class="buttons">
      <a class="btn" href="https://nova360app.de/vgrd/ulmaudi/audiulm/dist/?ext=user#/">
        <span class="btn-brand">Audi</span>
      </a>
      <a class="btn" href="https://nova360app.de/vgrd/heldstroehlede/heldstroehle/dist/?ext=user#/">
        <div class="btn-brands">
          <span>VW</span>
          <span class="divider">|</span>
          <span>Skoda</span>
          <span class="divider">|</span>
          <span>Seat</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
