<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standort wählen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 2rem;
    }
    .logo {
      width: 260px;
      height: auto;
    }
    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 90px;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      padding: 18px 24px;
      transition: border-color 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      flex-direction: column;
      gap: 4px;
    }
    .btn:hover {
      border-color: #aaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .btn:active { transform: scale(0.97); }
    .btn-brand {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.5px;
    }
    .btn-brands {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-brands span {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }
    .btn-brands .divider {
      font-size: 14px;
      color: #bbb;
      font-weight: 400;
    }
    @media (max-width: 480px) {
      .btn { width: 260px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <img class="logo" src="Basis_PNG.png" alt="3C Detailing" />
    <div class="buttons">
      <a class="btn" href="https://nova360app.de/vgrd/ulmaudi/audiulm/dist/?ext=user#/">
        <span class="btn-brand">Audi</span>
      </a>
      <a class="btn" href="https://nova360app.de/vgrd/heldstroehlede/heldstroehle/dist/?ext=user#/">
        <div class="btn-brands">
          <span>VW</span>
          <span class="divider">|</span>
          <span>Skoda</span>
          <span class="divider">|</span>
          <span>Seat</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
